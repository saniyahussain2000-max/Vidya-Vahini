<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- 
      Navigation Shell Suppressed: 
      As per the "Automatic Suppression" rule, TopAppBar (with nav), BottomNavBar, and NavigationDrawer 
      are excluded from this transactional onboarding screen to focus the user on the canvas.
    -->
<!-- Minimal Brand Header -->
<header class="w-full flex justify-center py-6 pt-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
<span class="font-headline-md text-headline-md text-primary tracking-tight">Vidya-Vahini</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-main pb-margin-main w-full max-w-md mx-auto">
<!-- Hero Graphic -->
<div class="w-full h-40 rounded-xl bg-surface-container-low mb-8 bg-cover bg-center shadow-sm overflow-hidden border border-outline-variant" data-alt="A bright, modern illustration of a stylized yellow school bus traveling along a clean, geometric blue path against a pristine white background. The scene is illuminated by high-key, soft white lighting that emphasizes clarity and a light-mode aesthetic. The composition uses a sophisticated palette centered on trust blue and alert yellow, creating a mood of calm assurance and dependable precision without any distracting textures or complex shadows." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB2J1RcIwK5ew8ZyJb2D2W9a3MAhSboa9lm-d4ZKcM8AIvPzrGcmLdsd3Cr_D2pLl-mkMaq6uuVta7lp9L_3QdUJDjS32kdqGQ_9UhAFkSM7AWlWMXnXEDx1tpFmb71l6N16mZSpQiSP3kKXbOz_pc7pvFXJQFQxzjf9jNJOsrFii0m1npmfWEUhag5wEBPLtZG0daZTBJMO1H_dsskQpzAHb8TT8r68-1jev2fi6d9Y459320LeVQBPMasjmGVS9mWhfUVuIvaBU8');">
</div>
<!-- Typography Block -->
<div class="flex flex-col gap-2 mb-10">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Find Your Route</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select your institution and preferred bus route to begin real-time tracking.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6 flex-grow">
<!-- College Selection -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface flex items-center gap-2" for="college-select">
<span class="material-symbols-outlined text-outline text-lg">school</span>
                    College / School Name
                </label>
<!-- Custom styling for input wrapper to achieve 1px border -> 2px on focus visually via ring -->
<div class="relative flex items-center h-touch-target-min w-full bg-surface-container-lowest border border-outline rounded-lg focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant ml-3 mr-2 pointer-events-none">search</span>
<input autocomplete="off" class="flex-grow bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/60 h-full w-full px-0" id="college-select" placeholder="Search your institution..." type="text"/>
<span class="material-symbols-outlined text-on-surface-variant mr-3 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Route Selection -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface flex items-center gap-2" for="route-select">
<span class="material-symbols-outlined text-outline text-lg">route</span>
                    Route Number / Name
                </label>
<div class="relative flex items-center h-touch-target-min w-full bg-surface-container-lowest border border-outline rounded-lg focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant ml-3 mr-2 pointer-events-none">directions</span>
<input autocomplete="off" class="flex-grow bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/60 h-full w-full px-0" id="route-select" placeholder="e.g., GDC Rural Campus - Route 4A" type="text"/>
<span class="material-symbols-outlined text-on-surface-variant mr-3 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Spacer to push button to bottom if needed on taller screens -->
<div class="flex-grow"></div>
<!-- Action Area -->
<div class="pt-8 pb-4">
<button class="w-full h-touch-target-lg bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-95 transition-transform duration-200 shadow-sm border border-transparent" type="button">
                    Confirm Route
                    <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
</form>
